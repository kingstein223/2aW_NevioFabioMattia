    <style>

       .search-container{

            transform: scale(105%);

        header {
        position: relative;

        .weather-widget {
        width: 300px;

        position: absolute;

        transform: translateX(-50%);

        }

        .main-menu ul {
        list-style: none;
        display: flex;
        gap: 22px;
        margin: 0;
        padding: 0;
        }

        .main-menu a {
        display: inline-block;
        padding: 12px 26px;
        font-size: 18px;
        font-weight: 600;
        color: white;
        text-decoration: none;
        border-radius: 999px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.25);
        transition: all 0.25s ease;
        }
        
        .main-menu a:hover {
            transform: translateY(-3px) scale(1.05);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 14px 30px rgba(0,0,0,0.35);
        }
        
        .main-menu a:active {
            transform: translateY(1px) scale(0.97);
            box-shadow: 0 4px 10px rgba(0,0,0,0.25);
        }

        .home-logo {
            position: absolute;
            top: 1px;   
            left: 1px;   
            display: inline-block;
            filter: drop-shadow(0 0 10px rgba(0, 0, 0, 0.5));
        }

        .home-logo img {
            width: 160px;  
            height: auto;
            transition: all 0.25s ease;
            cursor: pointer;

        .home-logo img:hover {

        .home-logo img:active {

       .main-menu ul {
            list-style: none;

            padding: 0;

        .main-menu a {
            font-size: 28px;       
            padding: 10px 20px;     
            color: white;
            text-decoration: none;
            font-weight: bold;
        } 
        
        .main-menu a {
            color: white;
            font-family: "Poppins", sans-serif;

            color: white;

        .wave {
            position: absolute;

<body>
    <img class="wave"src="img/wave.svg" alt="Rom">
    <img class="rome" src="img/rome.jpg" alt="Rom">
    <iframe class="weather-widget"src="https://www.wetter.de/widget/heute/sr2yk43y/false/"></iframe>

    <div class="search-container">
    
    <div class="search-box">

    <input 
    type="text"
    id="searchInput"
    class="search-input"
    placeholder="Was suchst du in Rom?"
    autocomplete="off"
    >

    
    <div id="suggestions" class="suggestions"></div>

</div>

</div>

<script>

const pages = [
{ name: "Hotel", url: "hotel.html" },
{ name: "Restaurant", url: "restaurant.html" },
{ name: "Autovermietung", url: "autovermietung.html" },
{ name: "Attraktionen", url: "attraktionen.html" }
]

const input = document.getElementById("searchInput")
const suggestions = document.getElementById("suggestions")

input.addEventListener("input", function(){

let value = input.value.toLowerCase()

suggestions.innerHTML = ""

if(value === ""){
suggestions.style.display = "none"
return
}

let results = pages.filter(p => 
p.name.toLowerCase().includes(value)
)

results.forEach(result => {

let div = document.createElement("div")
div.classList.add("suggestion-item")
div.textContent = result.name

div.onclick = () => {
window.location.href = result.url
}

suggestions.appendChild(div)

})

suggestions.style.display = "block"

})

input.addEventListener("keypress", function(e){

if(e.key === "Enter"){

let value = input.value.toLowerCase()

let result = pages.find(p => 
p.name.toLowerCase().includes(value)
)

if(result){
window.location.href = result.url
}

}

})

</script>

</body>
